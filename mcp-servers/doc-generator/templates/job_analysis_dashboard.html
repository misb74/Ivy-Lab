<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
    .dashboard { max-width: 1200px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
    .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .header .meta { opacity: 0.8; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h3 { color: #2980b9; margin-bottom: 1rem; font-size: 1.1rem; }
    .metric { text-align: center; }
    .metric .value { font-size: 2.5rem; font-weight: 700; color: #3498db; }
    .metric .label { color: #666; margin-top: 0.5rem; }
    .chart-container { position: relative; height: 300px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #edf5fc; font-weight: 600; color: #555; }
    .salary-range { display: flex; align-items: center; gap: 1rem; margin: 1rem 0; }
    .salary-bar { flex: 1; background: #eee; height: 32px; border-radius: 16px; position: relative; overflow: hidden; }
    .salary-fill { position: absolute; top: 0; height: 100%; background: linear-gradient(90deg, #3498db, #2ecc71); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.85rem; }
    .salary-labels { display: flex; justify-content: space-between; font-size: 0.8rem; color: #888; }
    .qual-list { list-style: none; }
    .qual-list li { padding: 0.5rem 0; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 0.5rem; }
    .qual-badge { padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
    .qual-required { background: #e74c3c; color: white; }
    .qual-preferred { background: #f39c12; color: white; }
    .footer { text-align: center; color: #999; font-size: 0.8rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>{{TITLE}}</h1>
      <div class="meta">{{DASHBOARD_TYPE}} Dashboard | Generated {{GENERATED_AT}} | Powered by Auxia</div>
    </div>
    <div class="grid" id="metrics-grid"></div>
    <div id="salary-section"></div>
    <div class="grid" id="charts-grid"></div>
    <div id="qualifications-section"></div>
    <div id="table-section"></div>
    <div id="summary-section"></div>
    <div class="footer">Generated by Auxia — The Digital Twin of Work</div>
  </div>
  <script>
    const data = JSON.parse('{{DATA_JSON}}');

    // Render metrics
    const metricsGrid = document.getElementById('metrics-grid');
    if (data.metrics && Array.isArray(data.metrics)) {
      for (const m of data.metrics) {
        const card = document.createElement('div');
        card.className = 'card metric';
        let html = '<div class="value">' + m.value + '</div><div class="label">' + m.label + '</div>';
        if (m.delta) html += '<div style="font-size:0.8rem;margin-top:0.25rem;color:' + (m.delta.sentiment === 'positive' ? '#27ae60' : '#e74c3c') + '">' + m.delta.value + '</div>';
        card.innerHTML = html;
        metricsGrid.appendChild(card);
      }
    }

    // Render salary range visualization
    const salarySection = document.getElementById('salary-section');
    if (data.salary_range) {
      const sr = data.salary_range;
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      const min = sr.min || 0;
      const max = sr.max || 200000;
      const median = sr.median || Math.round((min + max) / 2);
      const scaleMax = Math.round(max * 1.2);
      const fillWidth = ((max - min) / scaleMax * 100);
      const fillLeft = (min / scaleMax * 100);
      card.innerHTML = '<h3>Salary Range</h3>' +
        '<div class="salary-range"><span>$' + min.toLocaleString() + '</span>' +
        '<div class="salary-bar"><div class="salary-fill" style="left:' + fillLeft + '%;width:' + fillWidth + '%">Median: $' + median.toLocaleString() + '</div></div>' +
        '<span>$' + max.toLocaleString() + '</span></div>' +
        '<div class="salary-labels"><span>10th percentile</span><span>Median</span><span>90th percentile</span></div>';
      salarySection.appendChild(card);
    }

    // Render requirements breakdown (pie chart)
    const chartsGrid = document.getElementById('charts-grid');
    if (data.requirements && typeof data.requirements === 'object') {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Requirements Breakdown</h3><div class="chart-container"><canvas id="reqChart"></canvas></div>';
      chartsGrid.appendChild(card);

      const labels = Object.keys(data.requirements);
      const values = Object.values(data.requirements);
      new Chart(document.getElementById('reqChart'), {
        type: 'doughnut',
        data: {
          labels: labels,
          datasets: [{ data: values, backgroundColor: ['#3498db', '#2ecc71', '#e74c3c', '#f39c12', '#9b59b6', '#1abc9c'] }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
      });
    }

    // Render skills importance chart
    if (data.skills && Array.isArray(data.skills)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Required Skills</h3><div class="chart-container" style="height:' + Math.max(300, data.skills.length * 28) + 'px"><canvas id="skillsChart"></canvas></div>';
      chartsGrid.appendChild(card);

      const sLabels = data.skills.map(s => typeof s === 'string' ? s : s.name);
      const sValues = data.skills.map(s => typeof s === 'object' ? (s.importance || s.level || 50) : 50);
      new Chart(document.getElementById('skillsChart'), {
        type: 'bar',
        data: {
          labels: sLabels,
          datasets: [{ label: 'Importance', data: sValues, backgroundColor: 'rgba(52, 152, 219, 0.7)', borderColor: '#2980b9', borderWidth: 1 }]
        },
        options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', scales: { x: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
      });
    }

    // Render custom chart
    if (data.chart) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>' + (data.chart.title || 'Chart') + '</h3><div class="chart-container"><canvas id="mainChart"></canvas></div>';
      chartsGrid.appendChild(card);
      var chartData;
      if (data.chart.chartData) {
        chartData = data.chart.chartData;
      } else if (data.chart.data && data.chart.xKey) {
        var labels = data.chart.data.map(function(d) { return d[data.chart.xKey]; });
        var yKeys = data.chart.yKeys || Object.keys(data.chart.data[0] || {}).filter(function(k) { return k !== data.chart.xKey; });
        var colors = ['#3498db', '#2ecc71', '#e74c3c', '#f39c12', '#9b59b6'];
        chartData = { labels: labels, datasets: yKeys.map(function(key, i) { return { label: key.charAt(0).toUpperCase() + key.slice(1), data: data.chart.data.map(function(d) { return d[key]; }), backgroundColor: colors[i % colors.length] + '99', borderColor: colors[i % colors.length], borderWidth: 1 }; }) };
      } else {
        chartData = { labels: [], datasets: [] };
      }
      new Chart(document.getElementById('mainChart'), {
        type: data.chart.type || 'bar',
        data: chartData,
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    // Render qualifications
    const qualSection = document.getElementById('qualifications-section');
    if (data.qualifications && Array.isArray(data.qualifications)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      let html = '<h3>Qualifications</h3><ul class="qual-list">';
      for (const q of data.qualifications) {
        const isReq = q.required !== false;
        const badge = isReq ? '<span class="qual-badge qual-required">Required</span>' : '<span class="qual-badge qual-preferred">Preferred</span>';
        const desc = typeof q === 'string' ? q : (q.description || q.name || q);
        html += '<li>' + badge + ' ' + desc + '</li>';
      }
      html += '</ul>';
      card.innerHTML = html;
      qualSection.appendChild(card);
    }

    // Render table
    if (data.table) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      let tableHtml = '<h3>' + (data.table.title || 'Job Data') + '</h3><table><thead><tr>';
      for (const h of (data.table.headers || [])) { tableHtml += '<th>' + h + '</th>'; }
      tableHtml += '</tr></thead><tbody>';
      for (const row of (data.table.rows || [])) {
        tableHtml += '<tr>';
        for (const cell of row) { tableHtml += '<td>' + cell + '</td>'; }
        tableHtml += '</tr>';
      }
      tableHtml += '</tbody></table>';
      card.innerHTML = tableHtml;
      document.getElementById('table-section').appendChild(card);
    }

    // Render summary
    if (data.summary) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Summary</h3><p style="line-height:1.6">' + data.summary + '</p>';
      document.getElementById('summary-section').appendChild(card);
    }
  </script>
</body>
</html>
