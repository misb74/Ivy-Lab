<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
    .dashboard { max-width: 1200px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
    .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .header .meta { opacity: 0.8; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h3 { color: #e74c3c; margin-bottom: 1rem; font-size: 1.1rem; }
    .metric { text-align: center; }
    .metric .value { font-size: 2.5rem; font-weight: 700; color: #e74c3c; }
    .metric .label { color: #666; margin-top: 0.5rem; }
    .chart-container { position: relative; height: 300px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #fdf2f2; font-weight: 600; color: #555; }
    .overlap-pair { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1rem; }
    .overlap-pair h4 { color: #e74c3c; margin-bottom: 0.75rem; }
    .overlap-bar { background: #f0f0f0; border-radius: 8px; height: 24px; position: relative; overflow: hidden; margin: 0.5rem 0; }
    .overlap-fill { background: linear-gradient(90deg, #e74c3c, #f39c12); height: 100%; border-radius: 8px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: white; font-weight: 600; font-size: 0.8rem; }
    .shared-tasks { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .task-tag { background: #fdf2f2; color: #e74c3c; padding: 0.25rem 0.75rem; border-radius: 16px; font-size: 0.85rem; }
    .conflict-tag { background: #fff3cd; color: #856404; padding: 0.25rem 0.75rem; border-radius: 16px; font-size: 0.85rem; }
    .footer { text-align: center; color: #999; font-size: 0.8rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>{{TITLE}}</h1>
      <div class="meta">{{DASHBOARD_TYPE}} Dashboard | Generated {{GENERATED_AT}} | Powered by Auxia</div>
    </div>
    <div class="grid" id="metrics-grid"></div>
    <div id="overlap-chart-section"></div>
    <div id="overlap-pairs"></div>
    <div id="table-section"></div>
    <div id="summary-section"></div>
    <div class="footer">Generated by Auxia — The Digital Twin of Work</div>
  </div>
  <script>
    const data = JSON.parse('{{DATA_JSON}}');

    // Render metrics
    const metricsGrid = document.getElementById('metrics-grid');
    if (data.metrics && Array.isArray(data.metrics)) {
      for (const m of data.metrics) {
        const card = document.createElement('div');
        card.className = 'card metric';
        let html = '<div class="value">' + m.value + '</div><div class="label">' + m.label + '</div>';
        if (m.delta) html += '<div style="font-size:0.8rem;margin-top:0.25rem;color:' + (m.delta.sentiment === 'positive' ? '#27ae60' : '#e74c3c') + '">' + m.delta.value + '</div>';
        card.innerHTML = html;
        metricsGrid.appendChild(card);
      }
    }

    // Render overlap pairs with visual bars
    const pairsSection = document.getElementById('overlap-pairs');
    if (data.overlaps && Array.isArray(data.overlaps)) {
      const labels = [];
      const percentages = [];
      for (const overlap of data.overlaps) {
        labels.push(overlap.role1 + ' vs ' + overlap.role2);
        percentages.push(overlap.overlapPercentage || 0);

        const pair = document.createElement('div');
        pair.className = 'overlap-pair';
        let html = '<h4>' + overlap.role1 + ' &harr; ' + overlap.role2 + '</h4>';
        html += '<div class="overlap-bar"><div class="overlap-fill" style="width:' + Math.max(overlap.overlapPercentage, 5) + '%">' + overlap.overlapPercentage + '%</div></div>';
        if (overlap.sharedTasks && overlap.sharedTasks.length) {
          html += '<p style="font-size:0.85rem;color:#666;margin-top:0.5rem;">Shared Tasks:</p><div class="shared-tasks">';
          for (const t of overlap.sharedTasks) { html += '<span class="task-tag">' + t + '</span>'; }
          html += '</div>';
        }
        if (overlap.conflictingTasks && overlap.conflictingTasks.length) {
          html += '<p style="font-size:0.85rem;color:#856404;margin-top:0.5rem;">Conflicting Tasks:</p><div class="shared-tasks">';
          for (const t of overlap.conflictingTasks) { html += '<span class="conflict-tag">' + t + '</span>'; }
          html += '</div>';
        }
        pair.innerHTML = html;
        pairsSection.appendChild(pair);
      }

      // Render overlap chart
      if (labels.length > 0) {
        const chartSection = document.getElementById('overlap-chart-section');
        const card = document.createElement('div');
        card.className = 'card';
        card.style.marginBottom = '1.5rem';
        card.innerHTML = '<h3>Role Overlap Percentages</h3><div class="chart-container"><canvas id="overlapChart"></canvas></div>';
        chartSection.appendChild(card);
        new Chart(document.getElementById('overlapChart'), {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Overlap %',
              data: percentages,
              backgroundColor: 'rgba(231, 76, 60, 0.7)',
              borderColor: '#e74c3c',
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: 'y',
            scales: { x: { beginAtZero: true, max: 100, title: { display: true, text: 'Overlap %' } } },
            plugins: { legend: { display: false } }
          }
        });
      }
    }

    // Render chart if provided directly
    if (data.chart) {
      const chartSection = document.getElementById('overlap-chart-section');
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      card.innerHTML = '<h3>' + (data.chart.title || 'Chart') + '</h3><div class="chart-container"><canvas id="mainChart"></canvas></div>';
      chartSection.appendChild(card);
      var chartData;
      if (data.chart.chartData) {
        chartData = data.chart.chartData;
      } else if (data.chart.data && data.chart.xKey) {
        var labels = data.chart.data.map(function(d) { return d[data.chart.xKey]; });
        var yKeys = data.chart.yKeys || Object.keys(data.chart.data[0] || {}).filter(function(k) { return k !== data.chart.xKey; });
        var colors = ['#e74c3c', '#3498db', '#27ae60', '#f39c12', '#8e44ad'];
        chartData = { labels: labels, datasets: yKeys.map(function(key, i) { return { label: key.charAt(0).toUpperCase() + key.slice(1), data: data.chart.data.map(function(d) { return d[key]; }), backgroundColor: colors[i % colors.length] + '99', borderColor: colors[i % colors.length], borderWidth: 1 }; }) };
      } else {
        chartData = { labels: [], datasets: [] };
      }
      new Chart(document.getElementById('mainChart'), {
        type: data.chart.type || 'bar',
        data: chartData,
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    // Render table
    const tableSection = document.getElementById('table-section');
    if (data.table) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      let tableHtml = '<h3>' + (data.table.title || 'Role Details') + '</h3><table><thead><tr>';
      for (const h of (data.table.headers || [])) { tableHtml += '<th>' + h + '</th>'; }
      tableHtml += '</tr></thead><tbody>';
      for (const row of (data.table.rows || [])) {
        tableHtml += '<tr>';
        for (const cell of row) { tableHtml += '<td>' + cell + '</td>'; }
        tableHtml += '</tr>';
      }
      tableHtml += '</tbody></table>';
      card.innerHTML = tableHtml;
      tableSection.appendChild(card);
    }

    // Render summary
    if (data.summary) {
      const section = document.getElementById('summary-section');
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Summary</h3><p style="line-height:1.6">' + data.summary + '</p>';
      section.appendChild(card);
    }
  </script>
</body>
</html>
