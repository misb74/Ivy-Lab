<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
    .dashboard { max-width: 1200px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #8e44ad 0%, #6c3483 100%); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
    .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .header .meta { opacity: 0.8; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h3 { color: #8e44ad; margin-bottom: 1rem; font-size: 1.1rem; }
    .metric { text-align: center; }
    .metric .value { font-size: 2.5rem; font-weight: 700; color: #8e44ad; }
    .metric .label { color: #666; margin-top: 0.5rem; }
    .chart-container { position: relative; height: 300px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f5eef8; font-weight: 600; color: #555; }
    .gap-indicator { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 10px; font-size: 0.8rem; font-weight: 600; }
    .gap-high { background: #fde8e8; color: #e74c3c; }
    .gap-medium { background: #fef5e7; color: #f39c12; }
    .gap-low { background: #eafaf1; color: #27ae60; }
    .footer { text-align: center; color: #999; font-size: 0.8rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>{{TITLE}}</h1>
      <div class="meta">{{DASHBOARD_TYPE}} Dashboard | Generated {{GENERATED_AT}} | Powered by Auxia</div>
    </div>
    <div class="grid" id="metrics-grid"></div>
    <div class="grid" id="charts-grid"></div>
    <div id="gap-section"></div>
    <div id="table-section"></div>
    <div id="summary-section"></div>
    <div class="footer">Generated by Auxia — The Digital Twin of Work</div>
  </div>
  <script>
    const data = JSON.parse('{{DATA_JSON}}');

    // Render metrics
    const metricsGrid = document.getElementById('metrics-grid');
    if (data.metrics && Array.isArray(data.metrics)) {
      for (const m of data.metrics) {
        const card = document.createElement('div');
        card.className = 'card metric';
        let html = '<div class="value">' + m.value + '</div><div class="label">' + m.label + '</div>';
        if (m.delta) html += '<div style="font-size:0.8rem;margin-top:0.25rem;color:' + (m.delta.sentiment === 'positive' ? '#27ae60' : '#e74c3c') + '">' + m.delta.value + '</div>';
        card.innerHTML = html;
        metricsGrid.appendChild(card);
      }
    }

    // Render supply vs demand trend line chart
    const chartsGrid = document.getElementById('charts-grid');
    if (data.supply_demand_trend && Array.isArray(data.supply_demand_trend)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.gridColumn = 'span 2';
      card.innerHTML = '<h3>Supply vs Demand Trend</h3><div class="chart-container"><canvas id="trendChart"></canvas></div>';
      chartsGrid.appendChild(card);

      const periods = data.supply_demand_trend.map(d => d.period || d.date || d.label);
      const supply = data.supply_demand_trend.map(d => d.supply);
      const demand = data.supply_demand_trend.map(d => d.demand);
      new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
          labels: periods,
          datasets: [
            { label: 'Supply', data: supply, borderColor: '#8e44ad', backgroundColor: 'rgba(142, 68, 173, 0.1)', fill: true, tension: 0.3 },
            { label: 'Demand', data: demand, borderColor: '#e74c3c', backgroundColor: 'rgba(231, 76, 60, 0.1)', fill: true, tension: 0.3, borderDash: [5, 5] }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } }, plugins: { legend: { position: 'top' } } }
      });
    }

    // Render gap analysis
    const gapSection = document.getElementById('gap-section');
    if (data.gap_analysis && Array.isArray(data.gap_analysis)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';

      // Gap bar chart
      const gapLabels = data.gap_analysis.map(g => g.skill || g.role || g.category);
      const gapValues = data.gap_analysis.map(g => g.gap || (g.demand - g.supply));
      const gapColors = data.gap_analysis.map(g => {
        const severity = g.severity || (Math.abs(g.gap || 0) > 500 ? 'high' : Math.abs(g.gap || 0) > 200 ? 'medium' : 'low');
        return severity === 'high' ? '#e74c3c' : severity === 'medium' ? '#f39c12' : '#27ae60';
      });

      card.innerHTML = '<h3>Gap Analysis</h3><div class="chart-container"><canvas id="gapChart"></canvas></div>';
      gapSection.appendChild(card);

      new Chart(document.getElementById('gapChart'), {
        type: 'bar',
        data: {
          labels: gapLabels,
          datasets: [{ label: 'Gap (Demand - Supply)', data: gapValues, backgroundColor: gapColors }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { title: { display: true, text: 'Gap Size' } } }, plugins: { legend: { display: false } } }
      });

      // Gap detail table
      const tableCard = document.createElement('div');
      tableCard.className = 'card';
      tableCard.style.marginBottom = '1.5rem';
      let tHtml = '<h3>Gap Details</h3><table><thead><tr><th>Category</th><th>Demand</th><th>Supply</th><th>Gap</th><th>Severity</th></tr></thead><tbody>';
      for (const g of data.gap_analysis) {
        const name = g.skill || g.role || g.category || '-';
        const severity = g.severity || 'medium';
        const cls = severity === 'high' ? 'gap-high' : severity === 'low' ? 'gap-low' : 'gap-medium';
        tHtml += '<tr><td>' + name + '</td><td>' + (g.demand || '-') + '</td><td>' + (g.supply || '-') + '</td><td>' + (g.gap || '-') + '</td><td><span class="gap-indicator ' + cls + '">' + severity + '</span></td></tr>';
      }
      tHtml += '</tbody></table>';
      tableCard.innerHTML = tHtml;
      gapSection.appendChild(tableCard);
    }

    // Render custom chart
    if (data.chart) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>' + (data.chart.title || 'Chart') + '</h3><div class="chart-container"><canvas id="mainChart"></canvas></div>';
      chartsGrid.appendChild(card);
      // Build Chart.js data from xKey/yKeys format or use pre-built chartData
      var chartData;
      if (data.chart.chartData) {
        chartData = data.chart.chartData;
      } else if (data.chart.data && data.chart.xKey) {
        var labels = data.chart.data.map(function(d) { return d[data.chart.xKey]; });
        var yKeys = data.chart.yKeys || Object.keys(data.chart.data[0] || {}).filter(function(k) { return k !== data.chart.xKey; });
        var colors = ['#8e44ad', '#e74c3c', '#3498db', '#27ae60', '#f39c12'];
        chartData = {
          labels: labels,
          datasets: yKeys.map(function(key, i) {
            return {
              label: key.charAt(0).toUpperCase() + key.slice(1),
              data: data.chart.data.map(function(d) { return d[key]; }),
              backgroundColor: colors[i % colors.length] + '99',
              borderColor: colors[i % colors.length],
              borderWidth: 1
            };
          })
        };
      } else {
        chartData = { labels: [], datasets: [] };
      }
      new Chart(document.getElementById('mainChart'), {
        type: data.chart.type || 'bar',
        data: chartData,
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    // Render table
    if (data.table) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      let tableHtml = '<h3>' + (data.table.title || 'Workforce Data') + '</h3><table><thead><tr>';
      for (const h of (data.table.headers || [])) { tableHtml += '<th>' + h + '</th>'; }
      tableHtml += '</tr></thead><tbody>';
      for (const row of (data.table.rows || [])) {
        tableHtml += '<tr>';
        for (const cell of row) { tableHtml += '<td>' + cell + '</td>'; }
        tableHtml += '</tr>';
      }
      tableHtml += '</tbody></table>';
      card.innerHTML = tableHtml;
      document.getElementById('table-section').appendChild(card);
    }

    // Render summary
    if (data.summary) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Summary</h3><p style="line-height:1.6">' + data.summary + '</p>';
      document.getElementById('summary-section').appendChild(card);
    }
  </script>
</body>
</html>
