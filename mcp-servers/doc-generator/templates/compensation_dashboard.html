<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
    .dashboard { max-width: 1200px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
    .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .header .meta { opacity: 0.8; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h3 { color: #e67e22; margin-bottom: 1rem; font-size: 1.1rem; }
    .metric { text-align: center; }
    .metric .value { font-size: 2.5rem; font-weight: 700; color: #f39c12; }
    .metric .label { color: #666; margin-top: 0.5rem; }
    .chart-container { position: relative; height: 300px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #fef5e7; font-weight: 600; color: #555; }
    .equity-bar { display: flex; align-items: center; gap: 0.75rem; margin: 0.4rem 0; }
    .equity-label { width: 120px; font-size: 0.9rem; text-align: right; }
    .equity-track { flex: 1; background: #eee; height: 22px; border-radius: 11px; overflow: hidden; position: relative; }
    .equity-fill { height: 100%; border-radius: 11px; display: flex; align-items: center; padding-left: 8px; color: white; font-size: 0.8rem; font-weight: 600; }
    .equity-marker { position: absolute; top: -2px; width: 3px; height: 26px; background: #333; border-radius: 2px; }
    .benchmark-tag { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 10px; font-size: 0.8rem; font-weight: 600; }
    .below-market { background: #fde8e8; color: #e74c3c; }
    .at-market { background: #eafaf1; color: #27ae60; }
    .above-market { background: #ebf5fb; color: #3498db; }
    .footer { text-align: center; color: #999; font-size: 0.8rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>{{TITLE}}</h1>
      <div class="meta">{{DASHBOARD_TYPE}} Dashboard | Generated {{GENERATED_AT}} | Powered by Auxia</div>
    </div>
    <div class="grid" id="metrics-grid"></div>
    <div class="grid" id="charts-grid"></div>
    <div id="equity-section"></div>
    <div id="benchmarks-section"></div>
    <div id="table-section"></div>
    <div id="summary-section"></div>
    <div class="footer">Generated by Auxia — The Digital Twin of Work</div>
  </div>
  <script>
    const data = JSON.parse('{{DATA_JSON}}');

    // Render metrics
    const metricsGrid = document.getElementById('metrics-grid');
    if (data.metrics && Array.isArray(data.metrics)) {
      for (const m of data.metrics) {
        const card = document.createElement('div');
        card.className = 'card metric';
        let html = '<div class="value">' + m.value + '</div><div class="label">' + m.label + '</div>';
        if (m.delta) html += '<div style="font-size:0.8rem;margin-top:0.25rem;color:' + (m.delta.sentiment === 'positive' ? '#27ae60' : '#e74c3c') + '">' + m.delta.value + '</div>';
        card.innerHTML = html;
        metricsGrid.appendChild(card);
      }
    }

    const chartsGrid = document.getElementById('charts-grid');

    // Render salary distribution
    if (data.salary_distribution && Array.isArray(data.salary_distribution)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.gridColumn = 'span 2';
      card.innerHTML = '<h3>Salary Distribution</h3><div class="chart-container"><canvas id="distChart"></canvas></div>';
      chartsGrid.appendChild(card);

      const distLabels = data.salary_distribution.map(d => d.range || d.band || d.label);
      const distValues = data.salary_distribution.map(d => d.count || d.employees || d.value);

      new Chart(document.getElementById('distChart'), {
        type: 'bar',
        data: {
          labels: distLabels,
          datasets: [{
            label: 'Employees',
            data: distValues,
            backgroundColor: 'rgba(243, 156, 18, 0.7)',
            borderColor: '#e67e22',
            borderWidth: 1,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { y: { beginAtZero: true, title: { display: true, text: 'Number of Employees' } } },
          plugins: { legend: { display: false } }
        }
      });
    }

    // Render pay equity gaps
    const equitySection = document.getElementById('equity-section');
    if (data.pay_equity && Array.isArray(data.pay_equity)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      card.innerHTML = '<h3>Pay Equity Analysis</h3><div class="chart-container"><canvas id="equityChart"></canvas></div>';
      equitySection.appendChild(card);

      const eLabels = data.pay_equity.map(e => e.group || e.category || e.label);
      const eRatios = data.pay_equity.map(e => e.ratio || e.gap_percent || e.value);
      const eColors = eRatios.map(r => r >= 95 ? '#27ae60' : r >= 85 ? '#f39c12' : '#e74c3c');

      new Chart(document.getElementById('equityChart'), {
        type: 'bar',
        data: {
          labels: eLabels,
          datasets: [{
            label: 'Pay Ratio (%)',
            data: eRatios,
            backgroundColor: eColors
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { y: { min: 60, max: 110, title: { display: true, text: 'Pay Ratio (%)' } } },
          plugins: { legend: { display: false } }
        }
      });
    }

    // Render benchmarks comparison
    const benchSection = document.getElementById('benchmarks-section');
    if (data.benchmarks && Array.isArray(data.benchmarks)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      card.innerHTML = '<h3>Market Benchmarks</h3><div class="chart-container"><canvas id="benchChart"></canvas></div>';
      benchSection.appendChild(card);

      const bLabels = data.benchmarks.map(b => b.role || b.title || b.label);
      const bInternal = data.benchmarks.map(b => b.internal || b.current);
      const bMarket = data.benchmarks.map(b => b.market || b.benchmark || b.p50);

      new Chart(document.getElementById('benchChart'), {
        type: 'bar',
        data: {
          labels: bLabels,
          datasets: [
            { label: 'Internal', data: bInternal, backgroundColor: 'rgba(243, 156, 18, 0.7)', borderColor: '#e67e22', borderWidth: 1 },
            { label: 'Market (P50)', data: bMarket, backgroundColor: 'rgba(52, 152, 219, 0.7)', borderColor: '#2980b9', borderWidth: 1 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { y: { beginAtZero: true, ticks: { callback: function(v) { return '$' + v.toLocaleString(); } } } },
          plugins: { legend: { position: 'top' } }
        }
      });

      // Benchmark detail table
      const tCard = document.createElement('div');
      tCard.className = 'card';
      tCard.style.marginBottom = '1.5rem';
      let tHtml = '<h3>Benchmark Details</h3><table><thead><tr><th>Role</th><th>Internal</th><th>Market</th><th>Ratio</th><th>Status</th></tr></thead><tbody>';
      for (const b of data.benchmarks) {
        const name = b.role || b.title || b.label;
        const internal = b.internal || b.current || 0;
        const market = b.market || b.benchmark || b.p50 || 0;
        const ratio = market > 0 ? Math.round((internal / market) * 100) : 0;
        const status = ratio >= 105 ? 'above-market' : ratio >= 95 ? 'at-market' : 'below-market';
        const statusText = ratio >= 105 ? 'Above' : ratio >= 95 ? 'At Market' : 'Below';
        tHtml += '<tr><td>' + name + '</td><td>$' + internal.toLocaleString() + '</td><td>$' + market.toLocaleString() + '</td><td>' + ratio + '%</td><td><span class="benchmark-tag ' + status + '">' + statusText + '</span></td></tr>';
      }
      tHtml += '</tbody></table>';
      tCard.innerHTML = tHtml;
      benchSection.appendChild(tCard);
    }

    // Render custom chart
    if (data.chart) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>' + (data.chart.title || 'Chart') + '</h3><div class="chart-container"><canvas id="mainChart"></canvas></div>';
      chartsGrid.appendChild(card);
      var chartData;
      if (data.chart.chartData) {
        chartData = data.chart.chartData;
      } else if (data.chart.data && data.chart.xKey) {
        var labels = data.chart.data.map(function(d) { return d[data.chart.xKey]; });
        var yKeys = data.chart.yKeys || Object.keys(data.chart.data[0] || {}).filter(function(k) { return k !== data.chart.xKey; });
        var colors = ['#f39c12', '#3498db', '#e74c3c', '#27ae60', '#9b59b6'];
        chartData = { labels: labels, datasets: yKeys.map(function(key, i) { return { label: key.charAt(0).toUpperCase() + key.slice(1), data: data.chart.data.map(function(d) { return d[key]; }), backgroundColor: colors[i % colors.length] + '99', borderColor: colors[i % colors.length], borderWidth: 1 }; }) };
      } else {
        chartData = { labels: [], datasets: [] };
      }
      new Chart(document.getElementById('mainChart'), {
        type: data.chart.type || 'bar',
        data: chartData,
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    // Render table
    if (data.table) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      let tableHtml = '<h3>' + (data.table.title || 'Compensation Data') + '</h3><table><thead><tr>';
      for (const h of (data.table.headers || [])) { tableHtml += '<th>' + h + '</th>'; }
      tableHtml += '</tr></thead><tbody>';
      for (const row of (data.table.rows || [])) {
        tableHtml += '<tr>';
        for (const cell of row) { tableHtml += '<td>' + cell + '</td>'; }
        tableHtml += '</tr>';
      }
      tableHtml += '</tbody></table>';
      card.innerHTML = tableHtml;
      document.getElementById('table-section').appendChild(card);
    }

    // Render summary
    if (data.summary) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Summary</h3><p style="line-height:1.6">' + data.summary + '</p>';
      document.getElementById('summary-section').appendChild(card);
    }
  </script>
</body>
</html>
