<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
    .dashboard { max-width: 1200px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
    .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .header .meta { opacity: 0.8; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h3 { color: #2c3e50; margin-bottom: 1rem; font-size: 1.1rem; }
    .metric { text-align: center; }
    .metric .value { font-size: 2.5rem; font-weight: 700; color: #2c3e50; }
    .metric .label { color: #666; margin-top: 0.5rem; }
    .chart-container { position: relative; height: 300px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #ebedef; font-weight: 600; color: #555; }
    .span-indicator { display: inline-flex; align-items: center; gap: 0.3rem; }
    .span-dot { width: 10px; height: 10px; border-radius: 50%; }
    .span-narrow { background: #27ae60; }
    .span-optimal { background: #3498db; }
    .span-wide { background: #f39c12; }
    .span-too-wide { background: #e74c3c; }
    .depth-bar { display: flex; align-items: center; gap: 0.5rem; margin: 0.25rem 0; }
    .depth-level { width: 80px; font-size: 0.85rem; color: #666; }
    .depth-track { flex: 1; background: #eee; height: 18px; border-radius: 9px; overflow: hidden; }
    .depth-fill { height: 100%; border-radius: 9px; }
    .footer { text-align: center; color: #999; font-size: 0.8rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>{{TITLE}}</h1>
      <div class="meta">{{DASHBOARD_TYPE}} Dashboard | Generated {{GENERATED_AT}} | Powered by Auxia</div>
    </div>
    <div class="grid" id="metrics-grid"></div>
    <div class="grid" id="charts-grid"></div>
    <div id="span-section"></div>
    <div id="depth-section"></div>
    <div id="table-section"></div>
    <div id="summary-section"></div>
    <div class="footer">Generated by Auxia — The Digital Twin of Work</div>
  </div>
  <script>
    const data = JSON.parse('{{DATA_JSON}}');

    // Render metrics
    const metricsGrid = document.getElementById('metrics-grid');
    if (data.metrics && Array.isArray(data.metrics)) {
      for (const m of data.metrics) {
        const card = document.createElement('div');
        card.className = 'card metric';
        let html = '<div class="value">' + m.value + '</div><div class="label">' + m.label + '</div>';
        if (m.delta) html += '<div style="font-size:0.8rem;margin-top:0.25rem;color:' + (m.delta.sentiment === 'positive' ? '#27ae60' : '#e74c3c') + '">' + m.delta.value + '</div>';
        card.innerHTML = html;
        metricsGrid.appendChild(card);
      }
    }

    const chartsGrid = document.getElementById('charts-grid');

    // Render span of control distribution
    if (data.span_of_control && Array.isArray(data.span_of_control)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Span of Control Distribution</h3><div class="chart-container"><canvas id="spanChart"></canvas></div>';
      chartsGrid.appendChild(card);

      const spanLabels = data.span_of_control.map(s => s.manager || s.department || s.label);
      const spanValues = data.span_of_control.map(s => s.direct_reports || s.span || s.value);
      const spanColors = spanValues.map(v => v <= 4 ? '#27ae60' : v <= 8 ? '#3498db' : v <= 12 ? '#f39c12' : '#e74c3c');

      new Chart(document.getElementById('spanChart'), {
        type: 'bar',
        data: {
          labels: spanLabels,
          datasets: [{ label: 'Direct Reports', data: spanValues, backgroundColor: spanColors }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { y: { beginAtZero: true, title: { display: true, text: 'Direct Reports' } } },
          plugins: {
            legend: { display: false },
            annotation: { annotations: { line1: { type: 'line', yMin: 8, yMax: 8, borderColor: '#3498db', borderDash: [5, 5], label: { display: true, content: 'Optimal Max (8)', position: 'end' } } } }
          }
        }
      });
    }

    // Render depth analysis
    if (data.depth_analysis && Array.isArray(data.depth_analysis)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Organizational Depth</h3><div class="chart-container"><canvas id="depthChart"></canvas></div>';
      chartsGrid.appendChild(card);

      const depthLabels = data.depth_analysis.map(d => d.department || d.unit || d.label);
      const depthValues = data.depth_analysis.map(d => d.levels || d.depth || d.value);

      new Chart(document.getElementById('depthChart'), {
        type: 'bar',
        data: {
          labels: depthLabels,
          datasets: [{ label: 'Hierarchy Levels', data: depthValues, backgroundColor: 'rgba(44, 62, 80, 0.7)', borderColor: '#2c3e50', borderWidth: 1 }]
        },
        options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', scales: { x: { beginAtZero: true } }, plugins: { legend: { display: false } } }
      });
    }

    // Render department headcount distribution
    if (data.departments && Array.isArray(data.departments)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Department Distribution</h3><div class="chart-container"><canvas id="deptChart"></canvas></div>';
      chartsGrid.appendChild(card);

      const deptLabels = data.departments.map(d => d.name || d.department);
      const deptValues = data.departments.map(d => d.headcount || d.size || d.value);

      new Chart(document.getElementById('deptChart'), {
        type: 'doughnut',
        data: {
          labels: deptLabels,
          datasets: [{ data: deptValues, backgroundColor: ['#2c3e50', '#8e44ad', '#3498db', '#2ecc71', '#e74c3c', '#f39c12', '#1abc9c', '#e67e22'] }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
      });
    }

    // Render custom chart
    if (data.chart) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>' + (data.chart.title || 'Chart') + '</h3><div class="chart-container"><canvas id="mainChart"></canvas></div>';
      chartsGrid.appendChild(card);
      var chartData;
      if (data.chart.chartData) {
        chartData = data.chart.chartData;
      } else if (data.chart.data && data.chart.xKey) {
        var labels = data.chart.data.map(function(d) { return d[data.chart.xKey]; });
        var yKeys = data.chart.yKeys || Object.keys(data.chart.data[0] || {}).filter(function(k) { return k !== data.chart.xKey; });
        var colors = ['#2c3e50', '#8e44ad', '#3498db', '#2ecc71', '#e74c3c'];
        chartData = { labels: labels, datasets: yKeys.map(function(key, i) { return { label: key.charAt(0).toUpperCase() + key.slice(1), data: data.chart.data.map(function(d) { return d[key]; }), backgroundColor: colors[i % colors.length] + '99', borderColor: colors[i % colors.length], borderWidth: 1 }; }) };
      } else {
        chartData = { labels: [], datasets: [] };
      }
      new Chart(document.getElementById('mainChart'), {
        type: data.chart.type || 'bar',
        data: chartData,
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    // Render table
    if (data.table) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      let tableHtml = '<h3>' + (data.table.title || 'Org Structure Data') + '</h3><table><thead><tr>';
      for (const h of (data.table.headers || [])) { tableHtml += '<th>' + h + '</th>'; }
      tableHtml += '</tr></thead><tbody>';
      for (const row of (data.table.rows || [])) {
        tableHtml += '<tr>';
        for (const cell of row) { tableHtml += '<td>' + cell + '</td>'; }
        tableHtml += '</tr>';
      }
      tableHtml += '</tbody></table>';
      card.innerHTML = tableHtml;
      document.getElementById('table-section').appendChild(card);
    }

    // Render summary
    if (data.summary) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Summary</h3><p style="line-height:1.6">' + data.summary + '</p>';
      document.getElementById('summary-section').appendChild(card);
    }
  </script>
</body>
</html>
