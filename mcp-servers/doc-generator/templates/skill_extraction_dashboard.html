<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
    .dashboard { max-width: 1200px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
    .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .header .meta { opacity: 0.8; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h3 { color: #27ae60; margin-bottom: 1rem; font-size: 1.1rem; }
    .metric { text-align: center; }
    .metric .value { font-size: 2.5rem; font-weight: 700; color: #27ae60; }
    .metric .label { color: #666; margin-top: 0.5rem; }
    .chart-container { position: relative; height: 300px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f0faf4; font-weight: 600; color: #555; }
    .skill-bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .skill-name { width: 140px; font-size: 0.9rem; text-align: right; }
    .skill-track { flex: 1; background: #eee; border-radius: 8px; height: 20px; overflow: hidden; }
    .skill-fill { height: 100%; border-radius: 8px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; color: white; font-size: 0.75rem; font-weight: 600; }
    .category-section { margin-bottom: 1.5rem; }
    .category-label { font-weight: 600; color: #27ae60; margin-bottom: 0.75rem; font-size: 1rem; border-bottom: 2px solid #2ecc71; padding-bottom: 0.25rem; display: inline-block; }
    .footer { text-align: center; color: #999; font-size: 0.8rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>{{TITLE}}</h1>
      <div class="meta">{{DASHBOARD_TYPE}} Dashboard | Generated {{GENERATED_AT}} | Powered by Auxia</div>
    </div>
    <div class="grid" id="metrics-grid"></div>
    <div id="charts-section"></div>
    <div id="skills-section"></div>
    <div id="table-section"></div>
    <div id="summary-section"></div>
    <div class="footer">Generated by Auxia — The Digital Twin of Work</div>
  </div>
  <script>
    const data = JSON.parse('{{DATA_JSON}}');
    const colors = ['#2ecc71', '#3498db', '#9b59b6', '#e67e22', '#1abc9c', '#e74c3c', '#f1c40f', '#34495e'];

    // Render metrics
    const metricsGrid = document.getElementById('metrics-grid');
    if (data.metrics && Array.isArray(data.metrics)) {
      for (const m of data.metrics) {
        const card = document.createElement('div');
        card.className = 'card metric';
        let html = '<div class="value">' + m.value + '</div><div class="label">' + m.label + '</div>';
        if (m.delta) html += '<div style="font-size:0.8rem;margin-top:0.25rem;color:' + (m.delta.sentiment === 'positive' ? '#27ae60' : '#e74c3c') + '">' + m.delta.value + '</div>';
        card.innerHTML = html;
        metricsGrid.appendChild(card);
      }
    }

    // Render skills by category with proficiency bars
    const skillsSection = document.getElementById('skills-section');
    if (data.skills_by_category && typeof data.skills_by_category === 'object') {
      const categories = Object.entries(data.skills_by_category);

      // Category distribution pie chart
      const chartCard = document.createElement('div');
      chartCard.className = 'card';
      chartCard.style.marginBottom = '1.5rem';
      chartCard.innerHTML = '<h3>Skills by Category</h3><div class="chart-container"><canvas id="categoryChart"></canvas></div>';
      document.getElementById('charts-section').appendChild(chartCard);

      const catLabels = categories.map(([name]) => name);
      const catCounts = categories.map(([, skills]) => Array.isArray(skills) ? skills.length : 0);
      new Chart(document.getElementById('categoryChart'), {
        type: 'doughnut',
        data: {
          labels: catLabels,
          datasets: [{ data: catCounts, backgroundColor: colors.slice(0, catLabels.length) }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
      });

      // Skill proficiency bars per category
      let colorIdx = 0;
      for (const [category, skills] of categories) {
        if (!Array.isArray(skills)) continue;
        const card = document.createElement('div');
        card.className = 'card';
        card.style.marginBottom = '1rem';
        let html = '<div class="category-section"><div class="category-label">' + category + '</div>';
        for (const skill of skills) {
          const name = typeof skill === 'string' ? skill : (skill.name || skill);
          const level = typeof skill === 'object' ? (skill.proficiency || skill.level || 50) : 50;
          const color = colors[colorIdx % colors.length];
          html += '<div class="skill-bar"><span class="skill-name">' + name + '</span>';
          html += '<div class="skill-track"><div class="skill-fill" style="width:' + level + '%;background:' + color + '">' + level + '%</div></div></div>';
        }
        html += '</div>';
        card.innerHTML = html;
        skillsSection.appendChild(card);
        colorIdx++;
      }
    }

    // Render flat skills list as horizontal bar chart
    if (data.skills && Array.isArray(data.skills) && !data.skills_by_category) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      card.innerHTML = '<h3>Extracted Skills</h3><div class="chart-container" style="height:' + Math.max(300, data.skills.length * 30) + 'px"><canvas id="skillsBarChart"></canvas></div>';
      document.getElementById('charts-section').appendChild(card);

      const sLabels = data.skills.map(s => typeof s === 'string' ? s : s.name);
      const sValues = data.skills.map(s => typeof s === 'object' ? (s.proficiency || s.level || s.count || 50) : 50);
      new Chart(document.getElementById('skillsBarChart'), {
        type: 'bar',
        data: {
          labels: sLabels,
          datasets: [{ label: 'Proficiency', data: sValues, backgroundColor: 'rgba(46, 204, 113, 0.7)', borderColor: '#27ae60', borderWidth: 1 }]
        },
        options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', scales: { x: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
      });
    }

    // Render chart if provided directly
    if (data.chart) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      card.innerHTML = '<h3>' + (data.chart.title || 'Chart') + '</h3><div class="chart-container"><canvas id="mainChart"></canvas></div>';
      document.getElementById('charts-section').appendChild(card);
      var chartData;
      if (data.chart.chartData) {
        chartData = data.chart.chartData;
      } else if (data.chart.data && data.chart.xKey) {
        var labels = data.chart.data.map(function(d) { return d[data.chart.xKey]; });
        var yKeys = data.chart.yKeys || Object.keys(data.chart.data[0] || {}).filter(function(k) { return k !== data.chart.xKey; });
        var colors = ['#2ecc71', '#3498db', '#9b59b6', '#e67e22', '#1abc9c'];
        chartData = { labels: labels, datasets: yKeys.map(function(key, i) { return { label: key.charAt(0).toUpperCase() + key.slice(1), data: data.chart.data.map(function(d) { return d[key]; }), backgroundColor: colors[i % colors.length] + '99', borderColor: colors[i % colors.length], borderWidth: 1 }; }) };
      } else {
        chartData = { labels: [], datasets: [] };
      }
      new Chart(document.getElementById('mainChart'), {
        type: data.chart.type || 'bar',
        data: chartData,
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    // Render table
    if (data.table) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      let tableHtml = '<h3>' + (data.table.title || 'Skills Data') + '</h3><table><thead><tr>';
      for (const h of (data.table.headers || [])) { tableHtml += '<th>' + h + '</th>'; }
      tableHtml += '</tr></thead><tbody>';
      for (const row of (data.table.rows || [])) {
        tableHtml += '<tr>';
        for (const cell of row) { tableHtml += '<td>' + cell + '</td>'; }
        tableHtml += '</tr>';
      }
      tableHtml += '</tbody></table>';
      card.innerHTML = tableHtml;
      document.getElementById('table-section').appendChild(card);
    }

    // Render summary
    if (data.summary) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Summary</h3><p style="line-height:1.6">' + data.summary + '</p>';
      document.getElementById('summary-section').appendChild(card);
    }
  </script>
</body>
</html>
