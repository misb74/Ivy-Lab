<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
    .dashboard { max-width: 1200px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
    .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .header .meta { opacity: 0.8; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h3 { color: #16a085; margin-bottom: 1rem; font-size: 1.1rem; }
    .metric { text-align: center; }
    .metric .value { font-size: 2.5rem; font-weight: 700; color: #1abc9c; }
    .metric .label { color: #666; margin-top: 0.5rem; }
    .chart-container { position: relative; height: 300px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #e8f8f5; font-weight: 600; color: #555; }
    .path-timeline { display: flex; align-items: flex-start; gap: 0; margin: 2rem 0; overflow-x: auto; padding-bottom: 1rem; }
    .path-step { display: flex; flex-direction: column; align-items: center; min-width: 180px; position: relative; }
    .path-step:not(:last-child)::after { content: ''; position: absolute; top: 24px; left: 50%; width: 100%; height: 3px; background: #1abc9c; z-index: 0; }
    .step-circle { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; color: white; z-index: 1; position: relative; }
    .step-current { background: #1abc9c; box-shadow: 0 0 0 4px rgba(26, 188, 156, 0.3); }
    .step-future { background: #bdc3c7; }
    .step-title { font-weight: 600; margin-top: 0.75rem; text-align: center; font-size: 0.9rem; }
    .step-detail { color: #888; font-size: 0.8rem; text-align: center; margin-top: 0.25rem; }
    .step-salary { color: #1abc9c; font-weight: 600; font-size: 0.85rem; margin-top: 0.25rem; }
    .skill-req { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; margin-top: 0.5rem; }
    .skill-tag { background: #e8f8f5; color: #16a085; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.75rem; }
    .footer { text-align: center; color: #999; font-size: 0.8rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>{{TITLE}}</h1>
      <div class="meta">{{DASHBOARD_TYPE}} Dashboard | Generated {{GENERATED_AT}} | Powered by Auxia</div>
    </div>
    <div class="grid" id="metrics-grid"></div>
    <div id="path-section"></div>
    <div class="grid" id="charts-grid"></div>
    <div id="table-section"></div>
    <div id="summary-section"></div>
    <div class="footer">Generated by Auxia — The Digital Twin of Work</div>
  </div>
  <script>
    const data = JSON.parse('{{DATA_JSON}}');

    // Render metrics
    const metricsGrid = document.getElementById('metrics-grid');
    if (data.metrics && Array.isArray(data.metrics)) {
      for (const m of data.metrics) {
        const card = document.createElement('div');
        card.className = 'card metric';
        let html = '<div class="value">' + m.value + '</div><div class="label">' + m.label + '</div>';
        if (m.delta) html += '<div style="font-size:0.8rem;margin-top:0.25rem;color:' + (m.delta.sentiment === 'positive' ? '#27ae60' : '#e74c3c') + '">' + m.delta.value + '</div>';
        card.innerHTML = html;
        metricsGrid.appendChild(card);
      }
    }

    // Render career path timeline
    const pathSection = document.getElementById('path-section');
    if (data.steps && Array.isArray(data.steps)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      let html = '<h3>Career Progression Path</h3><div class="path-timeline">';
      data.steps.forEach((step, idx) => {
        const isCurrent = step.isCurrent || step.is_current || idx === 0;
        const circleClass = isCurrent ? 'step-current' : 'step-future';
        html += '<div class="path-step">';
        html += '<div class="step-circle ' + circleClass + '">' + (idx + 1) + '</div>';
        html += '<div class="step-title">' + (step.title || step.role || 'Step ' + (idx + 1)) + '</div>';
        if (step.level) html += '<div class="step-detail">' + step.level + '</div>';
        if (step.years || step.timeframe) html += '<div class="step-detail">' + (step.years || step.timeframe) + '</div>';
        if (step.salary) {
          const sal = typeof step.salary === 'object'
            ? '$' + (step.salary.median || step.salary.min || 0).toLocaleString()
            : '$' + Number(step.salary).toLocaleString();
          html += '<div class="step-salary">' + sal + '</div>';
        }
        if (step.skills && Array.isArray(step.skills)) {
          html += '<div class="skill-req">';
          for (const s of step.skills.slice(0, 4)) {
            const name = typeof s === 'string' ? s : s.name;
            html += '<span class="skill-tag">' + name + '</span>';
          }
          html += '</div>';
        }
        html += '</div>';
      });
      html += '</div>';
      card.innerHTML = html;
      pathSection.appendChild(card);

      // Salary progression chart
      const salaries = data.steps.filter(s => s.salary).map(s => {
        const val = typeof s.salary === 'object' ? (s.salary.median || s.salary.min || 0) : Number(s.salary);
        return val;
      });
      const stepLabels = data.steps.map(s => s.title || s.role || 'Step');
      if (salaries.length > 1) {
        const chartCard = document.createElement('div');
        chartCard.className = 'card';
        chartCard.style.marginBottom = '1.5rem';
        chartCard.innerHTML = '<h3>Salary Progression</h3><div class="chart-container"><canvas id="salaryChart"></canvas></div>';
        document.getElementById('charts-grid').appendChild(chartCard);

        new Chart(document.getElementById('salaryChart'), {
          type: 'line',
          data: {
            labels: stepLabels,
            datasets: [{
              label: 'Salary',
              data: salaries,
              borderColor: '#1abc9c',
              backgroundColor: 'rgba(26, 188, 156, 0.15)',
              fill: true,
              tension: 0.3,
              pointBackgroundColor: '#1abc9c',
              pointRadius: 6
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            scales: { y: { beginAtZero: false, ticks: { callback: function(v) { return '$' + v.toLocaleString(); } } } },
            plugins: { legend: { display: false } }
          }
        });
      }
    }

    // Render skills per level radar
    if (data.skills_by_level && typeof data.skills_by_level === 'object') {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Skills Required by Level</h3><div class="chart-container"><canvas id="radarChart"></canvas></div>';
      document.getElementById('charts-grid').appendChild(card);

      const allSkills = new Set();
      for (const skills of Object.values(data.skills_by_level)) {
        if (Array.isArray(skills)) skills.forEach(s => allSkills.add(typeof s === 'string' ? s : s.name));
      }
      const skillLabels = Array.from(allSkills);
      const radarColors = ['#1abc9c', '#3498db', '#e74c3c', '#f39c12', '#9b59b6'];
      const datasets = [];
      let colorIdx = 0;
      for (const [level, skills] of Object.entries(data.skills_by_level)) {
        if (!Array.isArray(skills)) continue;
        const color = radarColors[colorIdx % radarColors.length];
        const values = skillLabels.map(sl => {
          const found = skills.find(s => (typeof s === 'string' ? s : s.name) === sl);
          return found ? (typeof found === 'object' ? (found.level || found.proficiency || 50) : 50) : 0;
        });
        datasets.push({ label: level, data: values, borderColor: color, backgroundColor: color + '33', pointBackgroundColor: color });
        colorIdx++;
      }

      new Chart(document.getElementById('radarChart'), {
        type: 'radar',
        data: { labels: skillLabels, datasets: datasets },
        options: { responsive: true, maintainAspectRatio: false, scales: { r: { beginAtZero: true, max: 100 } } }
      });
    }

    // Render custom chart
    if (data.chart) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>' + (data.chart.title || 'Chart') + '</h3><div class="chart-container"><canvas id="mainChart"></canvas></div>';
      document.getElementById('charts-grid').appendChild(card);
      var chartData;
      if (data.chart.chartData) {
        chartData = data.chart.chartData;
      } else if (data.chart.data && data.chart.xKey) {
        var labels = data.chart.data.map(function(d) { return d[data.chart.xKey]; });
        var yKeys = data.chart.yKeys || Object.keys(data.chart.data[0] || {}).filter(function(k) { return k !== data.chart.xKey; });
        var colors = ['#1abc9c', '#3498db', '#e74c3c', '#f39c12', '#9b59b6'];
        chartData = { labels: labels, datasets: yKeys.map(function(key, i) { return { label: key.charAt(0).toUpperCase() + key.slice(1), data: data.chart.data.map(function(d) { return d[key]; }), backgroundColor: colors[i % colors.length] + '99', borderColor: colors[i % colors.length], borderWidth: 1 }; }) };
      } else {
        chartData = { labels: [], datasets: [] };
      }
      new Chart(document.getElementById('mainChart'), {
        type: data.chart.type || 'bar',
        data: chartData,
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    // Render table
    if (data.table) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      let tableHtml = '<h3>' + (data.table.title || 'Career Data') + '</h3><table><thead><tr>';
      for (const h of (data.table.headers || [])) { tableHtml += '<th>' + h + '</th>'; }
      tableHtml += '</tr></thead><tbody>';
      for (const row of (data.table.rows || [])) {
        tableHtml += '<tr>';
        for (const cell of row) { tableHtml += '<td>' + cell + '</td>'; }
        tableHtml += '</tr>';
      }
      tableHtml += '</tbody></table>';
      card.innerHTML = tableHtml;
      document.getElementById('table-section').appendChild(card);
    }

    // Render summary
    if (data.summary) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Summary</h3><p style="line-height:1.6">' + data.summary + '</p>';
      document.getElementById('summary-section').appendChild(card);
    }
  </script>
</body>
</html>
