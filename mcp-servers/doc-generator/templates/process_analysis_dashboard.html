<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
    .dashboard { max-width: 1200px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
    .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .header .meta { opacity: 0.8; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h3 { color: #d35400; margin-bottom: 1rem; font-size: 1.1rem; }
    .metric { text-align: center; }
    .metric .value { font-size: 2.5rem; font-weight: 700; color: #e67e22; }
    .metric .label { color: #666; margin-top: 0.5rem; }
    .chart-container { position: relative; height: 300px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #fef3e7; font-weight: 600; color: #555; }
    .process-flow { display: flex; align-items: center; flex-wrap: wrap; gap: 0; margin: 1.5rem 0; }
    .process-step { background: white; border: 2px solid #e67e22; border-radius: 10px; padding: 1rem; min-width: 160px; text-align: center; position: relative; }
    .process-step .step-name { font-weight: 600; font-size: 0.95rem; color: #333; }
    .process-step .step-time { color: #e67e22; font-weight: 700; font-size: 0.9rem; margin-top: 0.25rem; }
    .process-step .step-auto { font-size: 0.8rem; margin-top: 0.25rem; }
    .auto-high { color: #27ae60; }
    .auto-medium { color: #f39c12; }
    .auto-low { color: #e74c3c; }
    .process-arrow { font-size: 1.5rem; color: #e67e22; padding: 0 0.5rem; }
    .automation-bar { display: flex; align-items: center; gap: 0.5rem; margin: 0.3rem 0; }
    .auto-label { width: 140px; font-size: 0.85rem; text-align: right; }
    .auto-track { flex: 1; background: #eee; height: 20px; border-radius: 10px; overflow: hidden; }
    .auto-fill { height: 100%; border-radius: 10px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; color: white; font-size: 0.75rem; font-weight: 600; }
    .footer { text-align: center; color: #999; font-size: 0.8rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <h1>{{TITLE}}</h1>
      <div class="meta">{{DASHBOARD_TYPE}} Dashboard | Generated {{GENERATED_AT}} | Powered by Auxia</div>
    </div>
    <div class="grid" id="metrics-grid"></div>
    <div id="flow-section"></div>
    <div class="grid" id="charts-grid"></div>
    <div id="automation-section"></div>
    <div id="table-section"></div>
    <div id="summary-section"></div>
    <div class="footer">Generated by Auxia — The Digital Twin of Work</div>
  </div>
  <script>
    const data = JSON.parse('{{DATA_JSON}}');

    // Render metrics
    const metricsGrid = document.getElementById('metrics-grid');
    if (data.metrics && Array.isArray(data.metrics)) {
      for (const m of data.metrics) {
        const card = document.createElement('div');
        card.className = 'card metric';
        let html = '<div class="value">' + m.value + '</div><div class="label">' + m.label + '</div>';
        if (m.delta) html += '<div style="font-size:0.8rem;margin-top:0.25rem;color:' + (m.delta.sentiment === 'positive' ? '#27ae60' : '#e74c3c') + '">' + m.delta.value + '</div>';
        card.innerHTML = html;
        metricsGrid.appendChild(card);
      }
    }

    // Render process flow
    const flowSection = document.getElementById('flow-section');
    if (data.steps && Array.isArray(data.steps)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      let html = '<h3>Process Flow</h3><div class="process-flow">';
      data.steps.forEach((step, idx) => {
        if (idx > 0) html += '<span class="process-arrow">&#8594;</span>';
        const autoLevel = step.automation_potential || step.automationPotential || 0;
        const autoClass = autoLevel >= 70 ? 'auto-high' : autoLevel >= 40 ? 'auto-medium' : 'auto-low';
        const autoText = autoLevel >= 70 ? 'High Auto' : autoLevel >= 40 ? 'Med Auto' : 'Low Auto';
        html += '<div class="process-step">';
        html += '<div class="step-name">' + (step.name || step.title || 'Step ' + (idx + 1)) + '</div>';
        if (step.time || step.duration) html += '<div class="step-time">' + (step.time || step.duration) + '</div>';
        html += '<div class="step-auto ' + autoClass + '">' + autoText + ' (' + autoLevel + '%)</div>';
        html += '</div>';
      });
      html += '</div>';
      card.innerHTML = html;
      flowSection.appendChild(card);

      // Time analysis chart
      const chartsGrid = document.getElementById('charts-grid');
      const timeCard = document.createElement('div');
      timeCard.className = 'card';
      timeCard.innerHTML = '<h3>Time per Step</h3><div class="chart-container"><canvas id="timeChart"></canvas></div>';
      chartsGrid.appendChild(timeCard);

      const stepLabels = data.steps.map(s => s.name || s.title || 'Step');
      const timeValues = data.steps.map(s => {
        const t = s.time_minutes || s.timeMinutes || s.hours || 0;
        return t;
      });
      const autoValues = data.steps.map(s => s.automation_potential || s.automationPotential || 0);

      new Chart(document.getElementById('timeChart'), {
        type: 'bar',
        data: {
          labels: stepLabels,
          datasets: [{
            label: 'Time (min)',
            data: timeValues,
            backgroundColor: 'rgba(230, 126, 34, 0.7)',
            borderColor: '#d35400',
            borderWidth: 1
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { y: { beginAtZero: true, title: { display: true, text: 'Minutes' } } },
          plugins: { legend: { display: false } }
        }
      });

      // Automation potential chart
      const autoCard = document.createElement('div');
      autoCard.className = 'card';
      autoCard.innerHTML = '<h3>Automation Potential</h3><div class="chart-container"><canvas id="autoChart"></canvas></div>';
      chartsGrid.appendChild(autoCard);

      const autoColors = autoValues.map(v => v >= 70 ? '#27ae60' : v >= 40 ? '#f39c12' : '#e74c3c');
      new Chart(document.getElementById('autoChart'), {
        type: 'bar',
        data: {
          labels: stepLabels,
          datasets: [{
            label: 'Automation %',
            data: autoValues,
            backgroundColor: autoColors
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          indexAxis: 'y',
          scales: { x: { beginAtZero: true, max: 100, title: { display: true, text: 'Automation Potential (%)' } } },
          plugins: { legend: { display: false } }
        }
      });
    }

    // Render custom chart
    if (data.chart) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>' + (data.chart.title || 'Chart') + '</h3><div class="chart-container"><canvas id="mainChart"></canvas></div>';
      document.getElementById('charts-grid').appendChild(card);
      var chartData;
      if (data.chart.chartData) {
        chartData = data.chart.chartData;
      } else if (data.chart.data && data.chart.xKey) {
        var labels = data.chart.data.map(function(d) { return d[data.chart.xKey]; });
        var yKeys = data.chart.yKeys || Object.keys(data.chart.data[0] || {}).filter(function(k) { return k !== data.chart.xKey; });
        var colors = ['#e67e22', '#3498db', '#27ae60', '#e74c3c', '#9b59b6'];
        chartData = { labels: labels, datasets: yKeys.map(function(key, i) { return { label: key.charAt(0).toUpperCase() + key.slice(1), data: data.chart.data.map(function(d) { return d[key]; }), backgroundColor: colors[i % colors.length] + '99', borderColor: colors[i % colors.length], borderWidth: 1 }; }) };
      } else {
        chartData = { labels: [], datasets: [] };
      }
      new Chart(document.getElementById('mainChart'), {
        type: data.chart.type || 'bar',
        data: chartData,
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    // Render automation detail section
    const autoSection = document.getElementById('automation-section');
    if (data.automation_opportunities && Array.isArray(data.automation_opportunities)) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      let html = '<h3>Automation Opportunities</h3><table><thead><tr><th>Process</th><th>Potential</th><th>Savings</th><th>Tool</th></tr></thead><tbody>';
      for (const opp of data.automation_opportunities) {
        html += '<tr><td>' + (opp.name || opp.process || '-') + '</td><td>' + (opp.potential || opp.score || '-') + '%</td><td>' + (opp.savings || opp.time_saved || '-') + '</td><td>' + (opp.tool || opp.recommendation || '-') + '</td></tr>';
      }
      html += '</tbody></table>';
      card.innerHTML = html;
      autoSection.appendChild(card);
    }

    // Render table
    if (data.table) {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.marginBottom = '1.5rem';
      let tableHtml = '<h3>' + (data.table.title || 'Process Data') + '</h3><table><thead><tr>';
      for (const h of (data.table.headers || [])) { tableHtml += '<th>' + h + '</th>'; }
      tableHtml += '</tr></thead><tbody>';
      for (const row of (data.table.rows || [])) {
        tableHtml += '<tr>';
        for (const cell of row) { tableHtml += '<td>' + cell + '</td>'; }
        tableHtml += '</tr>';
      }
      tableHtml += '</tbody></table>';
      card.innerHTML = tableHtml;
      document.getElementById('table-section').appendChild(card);
    }

    // Render summary
    if (data.summary) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h3>Summary</h3><p style="line-height:1.6">' + data.summary + '</p>';
      document.getElementById('summary-section').appendChild(card);
    }
  </script>
</body>
</html>
